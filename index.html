<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0014" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AirDuel" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>AirDuel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0014;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      padding-top: max(14px, env(safe-area-inset-top));
      pointer-events: none;
      z-index: 10;
    }

    #hud.visible { display: flex; }

    .score-box {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .score-box.player { color: #00e5ff; text-shadow: 0 0 8px #00e5ff; }
    .score-box.enemy  { color: #ff4444; text-shadow: 0 0 8px #ff4444; }

    #timerDisplay {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 0 0 12px #ffff00;
      min-width: 48px;
      text-align: center;
    }

    #timerDisplay.urgent {
      color: #ff4444;
      text-shadow: 0 0 12px #ff4444;
    }

    #muteBtn {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      right: 16px;
      z-index: 15;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 40px; height: 40px;
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #muteBtn.visible { display: flex; }
    #muteBtn:active  { background: rgba(255,255,255,0.2); }

    /* ── Overlay screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 0, 20, 0.92);
      z-index: 20;
      gap: 24px;
      padding: 20px;
    }

    .screen.hidden { display: none; }

    .screen-title {
      font-size: 2.8rem;
      font-weight: bold;
      color: #00e5ff;
      text-shadow: 0 0 24px #00e5ff, 0 0 48px #00e5ff44;
      letter-spacing: 6px;
      text-align: center;
    }

    .screen-sub {
      color: #88aacc;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.7;
      max-width: 300px;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 24px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #aac;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn {
      padding: 16px 48px;
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 3px;
      font-family: 'Courier New', monospace;
      border: 2px solid #00e5ff;
      border-radius: 10px;
      background: transparent;
      color: #00e5ff;
      cursor: pointer;
      text-shadow: 0 0 8px #00e5ff;
      box-shadow: 0 0 20px rgba(0,229,255,0.2), inset 0 0 20px rgba(0,229,255,0.05);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      background: #00e5ff;
      color: #000;
      box-shadow: 0 0 30px rgba(0,229,255,0.6);
    }

    /* ── Game Over ── */
    #resultText {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px currentColor;
    }

    #resultDetails {
      color: #aac;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    #resultBreakdown {
      display: flex;
      gap: 32px;
      font-size: 1.1rem;
    }

    .result-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .result-score .label { font-size: 0.7rem; letter-spacing: 2px; color: #888; }
    .result-score .value { font-size: 2rem; font-weight: bold; }
    .result-score.player .value { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }
    .result-score.enemy  .value { color: #ff4444; text-shadow: 0 0 10px #ff4444; }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="score-box player">YOU&nbsp;<span id="playerScore">0</span></div>
    <div id="timerDisplay">60</div>
    <div class="score-box enemy"><span id="enemyScore">0</span>&nbsp;CPU</div>
  </div>

  <!-- Mute button (visible during gameplay) -->
  <button id="muteBtn" class="visible">🔊</button>

  <!-- Start Screen -->
  <div id="startScreen" class="screen">
    <div class="screen-title">AIR<br>DUEL</div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#ff4444;box-shadow:0 0 6px #ff4444"></div>
        Enemy fires at you from above
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#00e5ff;box-shadow:0 0 6px #00e5ff"></div>
        Your ship fires automatically
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ffff00;box-shadow:0 0 6px #ffff00"></div>
        Drag (mobile) or ← → keys (desktop) — 60s
      </div>
    </div>
    <button id="startBtn" class="btn">START</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="screen hidden">
    <div id="resultText"></div>
    <div id="resultBreakdown">
      <div class="result-score player">
        <span class="label">YOU</span>
        <span class="value" id="finalPlayerScore">0</span>
      </div>
      <div class="result-score enemy">
        <span class="label">CPU</span>
        <span class="value" id="finalEnemyScore">0</span>
      </div>
    </div>
    <button id="restartBtn" class="btn">PLAY AGAIN</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
